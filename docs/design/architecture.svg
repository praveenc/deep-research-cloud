<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1060" width="1200" height="1060">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#5a5a5a"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#3b82f6"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#059669"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/></filter>
  </defs>

  <rect width="1200" height="1060" fill="#f8f6f3"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">Deep Research Cloud — Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#6a6a6a" font-size="13">Pre-processing Lambda + Agent Lambda + AgentCore Runtime MCP servers</text>

  <text x="38" y="95" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">FRONTEND</text>
  <rect x="420" y="76" width="360" height="48" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="600" y="97" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">CloudFront + S3</text>
  <text x="600" y="115" text-anchor="middle" fill="#4a4a4a" font-size="11">React SPA • Query form • Contract review • Report viewer</text>
  <line x1="600" y1="124" x2="600" y2="148" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>

  <text x="38" y="175" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">API</text>
  <rect x="340" y="150" width="520" height="48" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="600" y="171" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">API Gateway (REST + WebSocket)</text>
  <text x="600" y="189" text-anchor="middle" fill="#4a4a4a" font-size="11">Lambda Authorizer (Cognito JWT) • POST /research • POST /research/{slug}/start • WS</text>

  <line x1="460" y1="198" x2="340" y2="228" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="370" y="204" width="120" height="16" rx="3" fill="#f8f6f3" opacity="0.95"/>
  <text x="430" y="216" text-anchor="middle" fill="#5a5a5a" font-size="10">POST /research</text>

  <text x="38" y="258" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">PRE-PROCESS</text>
  <text x="38" y="272" fill="#9ca3af" font-size="10">(Lambda)</text>

  <rect x="150" y="230" width="430" height="70" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="365" y="254" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Pre-processing Lambda</text>
  <text x="365" y="272" text-anchor="middle" fill="#4a4a4a" font-size="11">1–2 LLM calls: Intent • Strategy • Decompose • Slug • Research Contract</text>
  <text x="365" y="289" text-anchor="middle" fill="#4a4a4a" font-size="11">Writes contract → S3 • Returns decomposition to client (~15–30s)</text>

  <path d="M 365,300 L 365,320 L 600,320 L 600,348" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-g)"/>
  <rect x="400" y="310" width="180" height="16" rx="3" fill="#f8f6f3" opacity="0.95"/>
  <text x="490" y="322" text-anchor="middle" fill="#059669" font-size="10" font-weight="500">Simple → invoke async</text>

  <path d="M 580,265 L 620,265 L 620,206 L 720,206 L 720,198" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>
  <rect x="625" y="220" width="180" height="16" rx="3" fill="#f8f6f3" opacity="0.95"/>
  <text x="715" y="232" text-anchor="middle" fill="#5a5a5a" font-size="10">Complex → return for approval</text>

  <line x1="740" y1="198" x2="820" y2="348" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="760" y="260" width="150" height="16" rx="3" fill="#f8f6f3" opacity="0.95"/>
  <text x="835" y="272" text-anchor="middle" fill="#5a5a5a" font-size="10">POST /{slug}/start</text>

  <text x="38" y="378" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">AGENT</text>
  <text x="38" y="392" fill="#9ca3af" font-size="10">(Lambda, 15 min)</text>

  <rect x="150" y="348" width="900" height="330" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.5" opacity="0.5"/>
  <text x="170" y="368" fill="#4a4a4a" font-size="13" font-weight="600">Agent Lambda — Strands Agent (full 15 min budget for research)</text>
  <text x="170" y="384" fill="#9ca3af" font-size="11">AgentSkills plugin • aws-deep-research skill • frontend-design skill</text>

  <rect x="190" y="396" width="830" height="40" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="605" y="414" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Parent Agent — Reads contract from S3 • Dispatches sub-agents • Verifies • Presents</text>
  <text x="605" y="430" text-anchor="middle" fill="#4a4a4a" font-size="10">Pushes progress via WS at each step</text>

  <line x1="360" y1="436" x2="310" y2="458" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="436" x2="600" y2="458" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="840" y1="436" x2="890" y2="458" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="175" y="454" width="860" height="75" rx="6" fill="none" stroke="#4a4a4a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="190" y="469" fill="#6a6a6a" font-size="10" font-weight="600" letter-spacing="0.06em">① PARALLEL: Research Sub-Agents (Pattern 3 — isolated context)</text>

  <rect x="195" y="478" width="250" height="42" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="320" y="497" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">aws-mcp-researcher</text>
  <text x="320" y="513" text-anchor="middle" fill="#4a4a4a" font-size="10">→ aws-docs.md to S3</text>

  <rect x="470" y="478" width="260" height="42" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="600" y="497" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">web-content-researcher</text>
  <text x="600" y="513" text-anchor="middle" fill="#4a4a4a" font-size="10">→ web-content.md to S3</text>

  <rect x="755" y="478" width="260" height="42" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="885" y="497" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">github-researcher</text>
  <text x="885" y="513" text-anchor="middle" fill="#4a4a4a" font-size="10">→ github-repos.md to S3</text>

  <line x1="600" y1="529" x2="600" y2="544" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="430" y="544" width="340" height="26" rx="8" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1"/>
  <text x="600" y="561" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">② Verify Findings — check S3 file sizes (OK / WEAK / MISSING)</text>

  <line x1="600" y1="570" x2="600" y2="584" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="360" y="584" width="480" height="38" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="600" y="600" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">③ synthesizer (sub-agent) — reads S3 findings, writes &lt;slug&gt;-report.md</text>
  <text x="600" y="616" text-anchor="middle" fill="#4a4a4a" font-size="10">Deduplicates • Organizes by topic • Inline citations • Gaps &amp; Limitations</text>

  <line x1="460" y1="622" x2="380" y2="638" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="740" y1="622" x2="780" y2="638" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="220" y="638" width="280" height="30" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="360" y="657" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">④ visual-generator (frontend-design skill)</text>

  <rect x="660" y="638" width="280" height="30" rx="8" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="800" y="657" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">④ notify (WS push → Client)</text>

  <text x="38" y="728" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">MCP SERVER</text>
  <text x="38" y="742" fill="#9ca3af" font-size="10">(AgentCore Runtime)</text>

  <path d="M 320,520 L 320,712 L 370,712" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <path d="M 600,520 L 600,540 L 155,540 L 155,730 L 370,730" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <path d="M 885,520 L 885,540 L 140,540 L 140,748 L 370,748" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>

  <rect x="168" y="700" width="178" height="18" rx="4" fill="#f8f6f3" opacity="0.95"/>
  <text x="257" y="714" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="500">MCP Streamable HTTP</text>

  <rect x="370" y="696" width="630" height="72" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="685" y="717" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">research-mcp-server (AgentCore Runtime)</text>
  <text x="685" y="734" text-anchor="middle" fill="#4a4a4a" font-size="11">Single FastMCP • port 8000 • SigV4 auth • Session-isolated microVM • stateless_http=True</text>

  <rect x="395" y="744" width="88" height="18" rx="5" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="439" y="757" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">fetch_url</text>
  <rect x="493" y="744" width="108" height="18" rx="5" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="547" y="757" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">aws_doc_search</text>
  <rect x="611" y="744" width="98" height="18" rx="5" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="660" y="757" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">brave_search</text>
  <rect x="719" y="744" width="104" height="18" rx="5" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="771" y="757" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">github_search</text>
  <rect x="833" y="744" width="90" height="18" rx="5" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="878" y="757" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">feed_extract</text>

  <text x="38" y="816" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">DATA</text>

  <rect x="150" y="798" width="280" height="58" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="290" y="820" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">S3 Research Bucket</text>
  <text x="290" y="838" text-anchor="middle" fill="#4a4a4a" font-size="11">s3://bucket/&lt;slug&gt;/ — contract • findings • report • visuals</text>

  <rect x="470" y="798" width="240" height="58" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="590" y="820" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">DynamoDB</text>
  <text x="590" y="838" text-anchor="middle" fill="#4a4a4a" font-size="11">Task tracking • API budget • WS connections</text>

  <rect x="750" y="798" width="260" height="58" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="880" y="820" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Secrets Manager</text>
  <text x="880" y="838" text-anchor="middle" fill="#4a4a4a" font-size="11">BRAVE_API_KEY • TAVILY_API_KEY • GITHUB_TOKEN</text>

  <line x1="450" y1="670" x2="330" y2="796" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="685" y1="768" x2="600" y2="796" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="800" y1="768" x2="850" y2="796" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <text x="38" y="902" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">SKILLS</text>
  <text x="38" y="916" fill="#9ca3af" font-size="10">(In both Lambdas)</text>

  <rect x="150" y="886" width="860" height="48" rx="10" fill="none" stroke="#4a4a4a" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="170" y="904" fill="#4a4a4a" font-size="11" font-weight="600">AgentSkills Plugin — Progressive Disclosure (~100 tokens/skill at startup)</text>

  <rect x="180" y="912" width="190" height="16" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="275" y="924" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">aws-deep-research</text>
  <rect x="390" y="912" width="150" height="16" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="465" y="924" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">frontend-design</text>
  <rect x="560" y="912" width="110" height="16" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="615" y="924" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="500">highcharts</text>
  <text x="700" y="924" fill="#9ca3af" font-size="10">full instructions on activation • resources loaded on demand</text>

  <rect x="840" y="955" width="340" height="55" rx="8" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="858" y="971" fill="#1a1a1a" font-size="10" font-weight="600">Legend</text>
  <line x1="858" y1="983" x2="888" y2="983" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="896" y="987" fill="#6a6a6a" font-size="10">Control flow</text>
  <line x1="978" y1="983" x2="1008" y2="983" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="1016" y="987" fill="#6a6a6a" font-size="10">MCP call (SigV4)</text>
  <line x1="1110" y1="983" x2="1140" y2="983" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="1148" y="987" fill="#6a6a6a" font-size="10">Async</text>
  <line x1="858" y1="998" x2="888" y2="998" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="896" y="1002" fill="#6a6a6a" font-size="10">Data R/W</text>
  <rect x="978" y="994" width="42" height="12" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="0.8"/>
  <text x="1028" y="1003" fill="#6a6a6a" font-size="10">Agent/Skill</text>
  <rect x="1090" y="994" width="42" height="12" rx="4" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="0.8"/>
  <text x="1140" y="1003" fill="#6a6a6a" font-size="10">Infra</text>

</svg>