<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" width="1200" height="1100">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-claude" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#059669"/>
    </marker>
    <filter id="shadow-soft">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000008"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1100" fill="#f8f6f3"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">Deep Research Cloud — Final Architecture</text>
  <text x="600" y="56" text-anchor="middle" fill="#6a6a6a" font-size="12">Single agent on AgentCore Runtime • Lambda MCP servers • ADOT/OpenTelemetry • Async + WebSocket</text>

  <!-- ═══════ LAYER 1: Frontend + API ═══════ -->
  <text x="40" y="90" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">FRONTEND + API</text>

  <rect x="160" y="78" width="220" height="50" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="270" y="99" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">CloudFront + S3</text>
  <text x="270" y="116" text-anchor="middle" fill="#4a4a4a" font-size="11">React SPA • Report Viewer</text>

  <rect x="420" y="78" width="360" height="50" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="600" y="99" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">API Gateway (REST + WebSocket)</text>
  <text x="600" y="116" text-anchor="middle" fill="#4a4a4a" font-size="11">Cognito JWT • Async invoke • WS progress push</text>

  <!-- Arrow from APIGW down -->
  <line x1="600" y1="128" x2="600" y2="160" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <rect x="543" y="136" width="115" height="16" rx="3" fill="#f8f6f3" opacity="0.95"/>
  <text x="600" y="148" text-anchor="middle" fill="#5a5a5a" font-size="10">async invoke</text>

  <!-- ═══════ LAYER 2: AgentCore Runtime ═══════ -->
  <text x="40" y="185" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">AGENT</text>
  <text x="40" y="198" fill="#9ca3af" font-size="10">(AgentCore Runtime)</text>

  <!-- Large Runtime container -->
  <rect x="140" y="162" width="780" height="340" rx="12" fill="#ffffff" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="160" y="182" fill="#4a4a4a" font-size="12" font-weight="600">AgentCore Runtime — Single Strands Agent</text>
  <text x="160" y="196" fill="#9ca3af" font-size="10">Idle timeout: 8h • HealthyBusy signaling • strands-agents[otel] → OTLP endpoint</text>

  <!-- Parent Agent -->
  <rect x="180" y="210" width="710" height="60" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="535" y="232" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Parent Agent (Orchestrator)</text>
  <text x="535" y="250" text-anchor="middle" fill="#4a4a4a" font-size="11">AgentSkills plugin (progressive disclosure) • Intent • Strategy • Decompose • Verify • Notify via WS</text>
  <text x="535" y="264" text-anchor="middle" fill="#5a5a5a" font-size="10">Skills: aws-deep-research • frontend-design • highcharts • html-design</text>

  <!-- Sub-agents -->
  <text x="195" y="296" fill="#6a6a6a" font-size="10" font-weight="600" letter-spacing="0.05em">IN-PROCESS SUB-AGENTS (Pattern 3 — isolated context)</text>

  <rect x="180" y="305" width="180" height="70" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="270" y="327" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">aws-mcp-researcher</text>
  <text x="270" y="343" text-anchor="middle" fill="#4a4a4a" font-size="10">AWS docs + pricing</text>
  <text x="270" y="358" text-anchor="middle" fill="#3b82f6" font-size="10">→ aws-docs-mcp, fetch-mcp</text>
  <text x="270" y="370" text-anchor="middle" fill="#5a5a5a" font-size="9">writes aws-docs.md → S3</text>

  <rect x="380" y="305" width="180" height="70" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="470" y="327" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">web-content-researcher</text>
  <text x="470" y="343" text-anchor="middle" fill="#4a4a4a" font-size="10">Web search + blogs</text>
  <text x="470" y="358" text-anchor="middle" fill="#3b82f6" font-size="10">→ brave-mcp, fetch-mcp, feeds-mcp</text>
  <text x="470" y="370" text-anchor="middle" fill="#5a5a5a" font-size="9">writes web-content.md → S3</text>

  <rect x="580" y="305" width="150" height="70" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="655" y="327" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">github-researcher</text>
  <text x="655" y="343" text-anchor="middle" fill="#4a4a4a" font-size="10">Repo + code search</text>
  <text x="655" y="358" text-anchor="middle" fill="#3b82f6" font-size="10">→ github-mcp</text>
  <text x="655" y="370" text-anchor="middle" fill="#5a5a5a" font-size="9">writes github-repos.md → S3</text>

  <rect x="750" y="305" width="130" height="70" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="815" y="327" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">synthesizer</text>
  <text x="815" y="343" text-anchor="middle" fill="#4a4a4a" font-size="10">Read findings + cite</text>
  <text x="815" y="358" text-anchor="middle" fill="#5a5a5a" font-size="10">writes report → S3</text>
  <text x="815" y="370" text-anchor="middle" fill="#9ca3af" font-size="9">runs AFTER verify</text>

  <!-- Sequence labels -->
  <text x="180" y="395" fill="#9ca3af" font-size="10">① parallel</text>
  <text x="580" y="395" fill="#9ca3af" font-size="10">① parallel</text>
  <text x="750" y="395" fill="#9ca3af" font-size="10">② sequential</text>

  <!-- Visual sub-agent -->
  <rect x="180" y="405" width="200" height="55" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="280" y="425" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">visual-generator</text>
  <text x="280" y="441" text-anchor="middle" fill="#4a4a4a" font-size="10">frontend-design + highcharts skills</text>
  <text x="280" y="454" text-anchor="middle" fill="#5a5a5a" font-size="9">writes visuals → S3 • ③ sequential</text>

  <!-- Token tracking -->
  <rect x="420" y="410" width="470" height="48" rx="8" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1" opacity="0.8"/>
  <text x="440" y="428" fill="#1a1a1a" font-size="11" font-weight="600">Token Usage Tracking (per Bedrock call)</text>
  <text x="440" y="443" fill="#4a4a4a" font-size="10">response.usage → InputTokens + OutputTokens + CacheRead/Write</text>
  <text x="440" y="455" fill="#5a5a5a" font-size="9">Attached as OTel span attributes + written to DDB cost ledger per slug/user</text>

  <!-- ═══════ LAYER 3: Lambda MCP Servers ═══════ -->
  <text x="40" y="530" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">MCP SERVERS</text>
  <text x="40" y="543" fill="#9ca3af" font-size="10">(Lambda + ADOT Layer)</text>

  <!-- Blue arrows -->
  <line x1="350" y1="502" x2="350" y2="525" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="500" y1="502" x2="500" y2="525" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="650" y1="502" x2="650" y2="525" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="140" y="525" width="780" height="65" rx="8" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3"/>

  <rect x="160" y="535" width="120" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="220" y="554" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">fetch-mcp</text>
  <text x="220" y="569" text-anchor="middle" fill="#6a6a6a" font-size="9">Web content</text>

  <rect x="300" y="535" width="135" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="367" y="554" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">aws-docs-mcp</text>
  <text x="367" y="569" text-anchor="middle" fill="#6a6a6a" font-size="9">Documentation</text>

  <rect x="455" y="535" width="120" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="515" y="554" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">brave-mcp</text>
  <text x="515" y="569" text-anchor="middle" fill="#6a6a6a" font-size="9">Web search</text>

  <rect x="595" y="535" width="120" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="655" y="554" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">github-mcp</text>
  <text x="655" y="569" text-anchor="middle" fill="#6a6a6a" font-size="9">Repo search</text>

  <rect x="735" y="535" width="110" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="790" y="554" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="600">feeds-mcp</text>
  <text x="790" y="569" text-anchor="middle" fill="#6a6a6a" font-size="9">Blog/RSS</text>

  <rect x="865" y="535" width="50" height="45" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="890" y="558" text-anchor="middle" fill="#6a6a6a" font-size="9">…</text>

  <!-- ═══════ LAYER 4: Data ═══════ -->
  <text x="40" y="630" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">DATA</text>

  <rect x="140" y="615" width="250" height="60" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="265" y="638" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">S3 Research Bucket</text>
  <text x="265" y="654" text-anchor="middle" fill="#4a4a4a" font-size="10">s3://bucket/&lt;slug&gt;/ — contract, findings, report, visuals</text>
  <text x="265" y="668" text-anchor="middle" fill="#9ca3af" font-size="9">Lifecycle: archive after 90d</text>

  <rect x="420" y="615" width="220" height="60" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="530" y="638" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">DynamoDB</text>
  <text x="530" y="654" text-anchor="middle" fill="#4a4a4a" font-size="10">Task status • WS connections</text>
  <text x="530" y="668" text-anchor="middle" fill="#4a4a4a" font-size="10">Cost ledger (tokens per slug/user)</text>

  <rect x="670" y="615" width="250" height="60" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="795" y="638" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Secrets Manager</text>
  <text x="795" y="654" text-anchor="middle" fill="#4a4a4a" font-size="10">BRAVE_API_KEY • TAVILY_API_KEY</text>
  <text x="795" y="668" text-anchor="middle" fill="#4a4a4a" font-size="10">GITHUB_TOKEN • cached 5-min TTL</text>

  <!-- Dashed arrows to data -->
  <line x1="300" y1="590" x2="265" y2="613" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-claude)"/>
  <line x1="530" y1="590" x2="530" y2="613" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-claude)"/>
  <line x1="790" y1="590" x2="795" y2="613" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-claude)"/>

  <!-- ═══════ LAYER 5: Observability (ADOT/OTel) ═══════ -->
  <text x="40" y="720" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">OBSERVABILITY</text>
  <text x="40" y="733" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">+ COST TRACKING</text>

  <rect x="140" y="700" width="780" height="185" rx="10" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ADOT / OTel -->
  <rect x="160" y="715" width="350" height="80" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="335" y="733" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">OpenTelemetry (ADOT)</text>
  <text x="335" y="749" text-anchor="middle" fill="#4a4a4a" font-size="10">Agent: strands-agents[otel] → OTLP endpoint (native)</text>
  <text x="335" y="763" text-anchor="middle" fill="#4a4a4a" font-size="10">Lambdas: ADOT Lambda layer (auto-instrumentation)</text>
  <text x="335" y="777" text-anchor="middle" fill="#4a4a4a" font-size="10">Spans: agent loops, LLM calls, tool use, sub-agents</text>
  <text x="335" y="790" text-anchor="middle" fill="#5a5a5a" font-size="9">Collector → CloudWatch (Application Signals + Transaction Search)</text>

  <!-- CloudWatch -->
  <rect x="530" y="715" width="370" height="80" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="715" y="733" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">CloudWatch Metrics + Dashboard</text>
  <text x="715" y="749" text-anchor="middle" fill="#4a4a4a" font-size="10">Bedrock: InputTokenCount, OutputTokenCount, TTFT, Latency</text>
  <text x="715" y="763" text-anchor="middle" fill="#4a4a4a" font-size="10">Lambda: Duration, Errors, Throttles (per MCP server)</text>
  <text x="715" y="777" text-anchor="middle" fill="#4a4a4a" font-size="10">Dashboard: $/run (metric math), cache hit ratio, p99 latency</text>
  <text x="715" y="790" text-anchor="middle" fill="#5a5a5a" font-size="9">EstimatedTPMQuotaUsage • CacheRead/Write metrics (free, auto-emitted)</text>

  <!-- Cost Tracking -->
  <rect x="160" y="805" width="360" height="65" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="823" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">Cost Attribution + Budget Alarms</text>
  <text x="340" y="839" text-anchor="middle" fill="#4a4a4a" font-size="10">DDB cost ledger: per-slug tokens from Bedrock response.usage</text>
  <text x="340" y="853" text-anchor="middle" fill="#4a4a4a" font-size="10">CW metric math: (Input + Output) × per-token rate → $/run</text>
  <text x="340" y="867" text-anchor="middle" fill="#4a4a4a" font-size="10">SNS alarm when monthly spend exceeds threshold</text>

  <!-- API Budget -->
  <rect x="540" y="805" width="360" height="65" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="823" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">Search API Budget Tracking</text>
  <text x="720" y="839" text-anchor="middle" fill="#4a4a4a" font-size="10">Brave: 2K/month • Tavily: 1K/month (DDB counter)</text>
  <text x="720" y="853" text-anchor="middle" fill="#4a4a4a" font-size="10">Pre-check before dispatch: reject if budget exhausted</text>
  <text x="720" y="867" text-anchor="middle" fill="#4a4a4a" font-size="10">CW alarm at 80% → notify user via WS</text>

  <!-- Green telemetry arrows -->
  <line x1="200" y1="502" x2="200" y2="700" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="900" y1="502" x2="900" y2="700" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══════ LAYER 6: Output ═══════ -->
  <text x="40" y="920" fill="#6a6a6a" font-size="11" font-weight="600" letter-spacing="0.08em">OUTPUT</text>

  <rect x="140" y="905" width="240" height="48" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="260" y="926" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Report + Visuals</text>
  <text x="260" y="943" text-anchor="middle" fill="#4a4a4a" font-size="11">CloudFront: /reports/&lt;slug&gt;/</text>

  <rect x="420" y="905" width="240" height="48" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="540" y="926" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">WebSocket Notify</text>
  <text x="540" y="943" text-anchor="middle" fill="#4a4a4a" font-size="11">Real-time progress → Client</text>

  <rect x="700" y="905" width="220" height="48" rx="12" fill="#dcfce7" stroke="#059669" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="810" y="926" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">CW Dashboard + Signals</text>
  <text x="810" y="943" text-anchor="middle" fill="#4a4a4a" font-size="11">Ops visibility • Traces • Cost</text>

  <!-- ═══════ LEGEND ═══════ -->
  <rect x="140" y="975" width="780" height="55" rx="8" fill="#ffffff" stroke="#4a4a4a" stroke-width="1"/>
  <text x="160" y="993" fill="#1a1a1a" font-size="11" font-weight="600">Legend</text>

  <line x1="160" y1="1008" x2="190" y2="1008" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <text x="197" y="1012" fill="#6a6a6a" font-size="10">Control flow</text>

  <line x1="280" y1="1008" x2="310" y2="1008" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="317" y="1012" fill="#6a6a6a" font-size="10">MCP invoke (IAM)</text>

  <line x1="415" y1="1008" x2="445" y2="1008" stroke="#5a5a5a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="452" y="1012" fill="#6a6a6a" font-size="10">Data R/W</text>

  <line x1="515" y1="1008" x2="545" y2="1008" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="552" y="1012" fill="#6a6a6a" font-size="10">OTel telemetry</text>

  <rect x="635" y="1001" width="40" height="14" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="683" y="1012" fill="#6a6a6a" font-size="10">Agent/Sub-agent</text>

  <rect x="770" y="1001" width="40" height="14" rx="4" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1"/>
  <text x="818" y="1012" fill="#6a6a6a" font-size="10">Infrastructure</text>

  <rect x="875" y="1001" width="40" height="14" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="923" y="1012" fill="#6a6a6a" font-size="10">Observability</text>

</svg>